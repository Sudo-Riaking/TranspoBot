<!DOCTYPE html>
<html lang="fr" data-theme="sombre">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TranspoBot — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════
   TOKENS
═══════════════════════════════════ */
:root,[data-theme="sombre"]{
  --bg:         #030614;
  --rose:       #ff4d9e; --rose2:#b8245e;
  --rose-glow:  rgba(255,77,158,0.40);
  --rose-dim:   rgba(255,77,158,0.12);
  --violet:     #a855f7; --violet2:#6d20c8;
  --violet-glow:rgba(168,85,247,0.35);
  --violet-dim: rgba(168,85,247,0.12);
  --ciel:       #38bdf8; --ciel2:#0284c7;
  --ciel-glow:  rgba(56,189,248,0.30);
  --ciel-dim:   rgba(56,189,248,0.10);
  --text:       #f0eaff; --text2:#7268a8; --text3:#252048;
  --border:     rgba(168,85,247,0.20);
  --glass:      rgba(8,5,40,0.72);
  --inp:        rgba(14,8,56,0.85);
  --pill-bg:    rgba(14,8,56,0.92);
  --pill-bdr:   rgba(168,85,247,0.32);
  --pill-act:   #a855f7; --pill-c:#7268a8;
  --err-bg:     rgba(255,77,158,0.14); --err-c:#ff4d9e;
}
[data-theme="clair"]{
  --bg:         #f0eeff;
  --rose:       #db2777; --rose2:#9d174d;
  --rose-glow:  rgba(219,39,119,0.20);
  --rose-dim:   rgba(219,39,119,0.10);
  --violet:     #7c3aed; --violet2:#4c1d95;
  --violet-glow:rgba(124,58,237,0.18);
  --violet-dim: rgba(124,58,237,0.09);
  --ciel:       #0284c7; --ciel2:#0369a1;
  --ciel-glow:  rgba(2,132,199,0.18);
  --ciel-dim:   rgba(2,132,199,0.09);
  --text:       #0a0720; --text2:#4c1d95; --text3:#c4b5fd;
  --border:     rgba(124,58,237,0.18);
  --glass:      rgba(255,255,255,0.86);
  --inp:        rgba(238,232,255,0.90);
  --pill-bg:    #e9e0ff;
  --pill-bdr:   rgba(124,58,237,0.28);
  --pill-act:   #0a0720; --pill-c:#4c1d95;
  --err-bg:     rgba(219,39,119,0.10); --err-c:#9d174d;
}

/* ═══════════════════════════════════
   BASE
═══════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg); color:var(--text);
  display:flex; align-items:center; justify-content:center;
  transition:background .6s, color .4s;
  position:relative;
}

/* ═══════════════════════════════════
   CANVAS FOND
═══════════════════════════════════ */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ═══════════════════════════════════
   SCÈNE ORBITALE
═══════════════════════════════════ */
.scene{
  position:relative; z-index:1;
  width:min(680px,95vw);
  height:min(680px,95vw);
  display:flex; align-items:center; justify-content:center;
}

/* Orbite elliptique (perspective simulée) */
.orbit-track{
  position:absolute; inset:0; border-radius:50%;
  border:1px solid rgba(168,85,247,0.14);
  transform:scaleY(0.38);
  transition:border-color .5s;
}
[data-theme="clair"] .orbit-track{border-color:rgba(124,58,237,0.16);}

/* Second anneau décoratif */
.orbit-track2{
  position:absolute; inset:22px; border-radius:50%;
  border:1px dashed rgba(56,189,248,0.08);
  transform:scaleY(0.38);
}

/* ── Conteneur orbital ── */
.bus-container{
  position:absolute; top:50%; left:50%;
  width:0; height:0;
  animation:orbit var(--orb-dur,9s) linear infinite;
}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.bus-arm{
  position:absolute; top:0; left:0;
  width:min(310px,43vw); height:0;
  transform-origin:0 0;
}
.bus-svg-wrap{
  position:absolute; left:100%; top:0;
  transform:translateY(-50%);
  animation:counterOrbit var(--orb-dur,9s) linear infinite;
  transform-origin:0 50%;
}
@keyframes counterOrbit{
  from{transform:translateY(-50%) rotate(0deg)}
  to{transform:translateY(-50%) rotate(-360deg)}
}

/* Perspective ellipse : le bus s'aplatit en haut/bas */
.bus-persp{animation:busPerspective var(--orb-dur,9s) linear infinite;}
@keyframes busPerspective{
  0%   {transform:scaleY(0.82);}
  25%  {transform:scaleY(1.05);}
  50%  {transform:scaleY(0.82);}
  75%  {transform:scaleY(1.05);}
  100% {transform:scaleY(0.82);}
}

/* Roues */
.wh{animation:wspin .42s linear infinite;}
@keyframes wspin{to{transform:rotate(360deg)}}

/* Phares */
.hl{animation:hlp 1.4s ease-in-out infinite alternate;}
@keyframes hlp{from{opacity:.55}to{opacity:1}}

/* Fumée */
.pf{animation:pfa var(--pd,1.4s) ease-out infinite;animation-delay:var(--pdl,0s);}
@keyframes pfa{
  0%  {opacity:.75;transform:scale(.35) translate(0,0);}
  100%{opacity:0;  transform:scale(2.6) translate(-10px,-18px);}
}

/* ── Canvas traînée ── */
#trail-canvas{
  position:absolute;inset:0;z-index:2;
  pointer-events:none;
}

/* ═══════════════════════════════════
   CARTE DE CONNEXION
═══════════════════════════════════ */
.login-card{
  position:relative; z-index:10;
  width:min(348px,82vw);
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:26px;
  padding:clamp(1.6rem,4vw,2.6rem) clamp(1.4rem,3.5vw,2.1rem);
  backdrop-filter:blur(32px) saturate(1.4);
  -webkit-backdrop-filter:blur(32px) saturate(1.4);
  box-shadow:
    0 0 0 1px rgba(168,85,247,0.07),
    0 30px 90px rgba(0,0,0,0.65),
    0 0 100px rgba(168,85,247,0.07),
    inset 0 1px 0 rgba(255,255,255,0.06);
  animation:cardIn .7s cubic-bezier(.34,1.56,.64,1);
}
[data-theme="clair"] .login-card{
  box-shadow:
    0 0 0 1px rgba(124,58,237,0.10),
    0 20px 60px rgba(124,58,237,0.14),
    inset 0 1px 0 rgba(255,255,255,0.7);
}
@keyframes cardIn{from{opacity:0;transform:scale(.84) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* Ligne néon dégradée */
.login-card::before{
  content:'';position:absolute;
  top:0;left:2.2rem;right:2.2rem;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--violet),var(--rose),var(--ciel),var(--violet),transparent);
  opacity:.65; border-radius:1px;
  animation:neonPulse 3s ease-in-out infinite alternate;
}
@keyframes neonPulse{from{opacity:.45}to{opacity:.8}}

/* Coin décoratif bas-droit */
.login-card::after{
  content:'';position:absolute;
  bottom:1.2rem;right:1.2rem;
  width:44px;height:44px;
  border-right:1px solid rgba(56,189,248,0.18);
  border-bottom:1px solid rgba(56,189,248,0.18);
  border-radius:0 0 8px 0;
}

/* ── Logo ── */
.card-logo{display:flex;align-items:center;gap:11px;margin-bottom:1.6rem;}
.logo-gem{
  width:42px;height:42px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(140deg,var(--violet2),var(--rose2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px var(--rose-glow),0 0 14px var(--violet-glow);
  position:relative;overflow:hidden;
  transition:box-shadow .3s;
}
.logo-gem:hover{box-shadow:0 0 36px var(--rose-glow),0 0 22px var(--violet-glow);}
.logo-gem::after{
  content:'';position:absolute;top:-7px;right:-7px;
  width:20px;height:20px;background:var(--ciel);
  border-radius:50%;opacity:.20;
}
.logo-gem svg{width:21px;height:21px;color:#fff;position:relative;z-index:1;}
.logo-name{
  font-size:19px;font-weight:800;letter-spacing:-.04em;
  background:linear-gradient(135deg,var(--text) 25%,var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
[data-theme="clair"] .logo-name{
  background:linear-gradient(135deg,#0a0720 20%,var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-top:2px;font-weight:500;}

/* ── Titres ── */
.card-title{font-size:17px;font-weight:700;letter-spacing:-.025em;color:var(--text);margin-bottom:.25rem;}
.card-sub{font-size:12px;color:var(--text2);margin-bottom:1.6rem;font-weight:300;letter-spacing:.01em;}

/* ── Champs ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem;}
.field label{
  font-size:10.5px;font-weight:700;
  color:var(--text2);text-transform:uppercase;letter-spacing:.08em;
}
.field-wrap{position:relative;}
.fi{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--text3);
  pointer-events:none;transition:color .22s;
}
.field input{
  width:100%;padding:11.5px 14px 11.5px 40px;
  background:var(--inp);
  border:1px solid var(--border);
  border-radius:12px;color:var(--text);
  font-family:'Inter',sans-serif;font-size:13.5px;
  outline:none;transition:all .25s;letter-spacing:.01em;
}
.field input::placeholder{color:var(--text3);font-weight:300;}
.field input:focus{
  border-color:var(--rose);
  box-shadow:0 0 0 3px var(--rose-dim),0 0 18px var(--rose-glow);
}
.field-wrap:has(input:focus) .fi{color:var(--rose);}
.eye{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  cursor:pointer;color:var(--text3);transition:color .22s;
  width:15px;height:15px;
}
.eye:hover{color:var(--rose);}

/* Indicateur force mot de passe */
.pwd-strength{
  display:flex;gap:3px;margin-top:4px;
  height:2.5px;
}
.pwd-bar{flex:1;border-radius:2px;background:var(--border);transition:background .3s;}
.pwd-bar.s1{background:var(--rose);}
.pwd-bar.s2{background:#f59e0b;}
.pwd-bar.s3{background:#10b981;}

/* ── Erreur ── */
.err-box{
  display:none;
  background:var(--err-bg);border:1px solid rgba(255,77,158,.25);
  border-radius:10px;padding:9px 13px;
  font-size:12.5px;color:var(--err-c);
  margin-bottom:1rem;align-items:center;gap:8px;
  transition:all .3s;
}
.err-box.show{display:flex;animation:shake .38s ease;}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* ── Bouton connexion ── */
.btn-login{
  width:100%;padding:12.5px;
  background:linear-gradient(135deg,var(--rose2),var(--violet2));
  border:none;border-radius:13px;color:#fff;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:.01em;cursor:pointer;transition:all .28s;
  box-shadow:0 5px 22px var(--rose-glow),0 2px 8px var(--violet-glow);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-login::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--violet2),var(--ciel2));
  opacity:0;transition:opacity .28s;
}
.btn-login::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.08));
}
.btn-login:hover::before{opacity:1;}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 32px var(--rose-glow),0 4px 14px var(--violet-glow);}
.btn-login:active{transform:scale(.97);}
.btn-login>*{position:relative;z-index:1;}
.spinner{
  display:none;width:17px;height:17px;
  border:2.5px solid rgba(255,255,255,.25);
  border-top-color:#fff;border-radius:50%;
  animation:wspin .65s linear infinite;
}

/* ── Succès ── */
.btn-login.success{
  background:linear-gradient(135deg,#059669,#0d9488) !important;
  box-shadow:0 6px 24px rgba(5,150,105,0.4) !important;
}

/* ── Séparateur ── */
.divider{
  display:flex;align-items:center;gap:10px;
  margin:1.1rem 0;color:var(--text3);
  font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* ── Compte démo (cliquable) ── */
.demo-box{
  margin-top:.1rem;padding:10px 13px;
  background:var(--ciel-dim);
  border:1px solid rgba(56,189,248,.18);
  border-radius:10px;cursor:pointer;
  transition:all .22s;
}
.demo-box:hover{
  background:rgba(56,189,248,0.14);
  border-color:rgba(56,189,248,.35);
  transform:translateY(-1px);
}
.demo-title{
  font-size:10px;font-weight:700;color:var(--ciel);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;
  display:flex;align-items:center;gap:5px;
}
.demo-row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--text2);padding:1.5px 0;}
.demo-row span:last-child{font-family:monospace;color:var(--ciel);font-size:11.5px;}
.demo-hint{font-size:10px;color:var(--text3);margin-top:5px;text-align:center;}

/* ── Pied de carte ── */
.card-foot{
  margin-top:1.2rem;text-align:center;
  font-size:10.5px;color:var(--text3);font-weight:300;
}

/* ── Toggle thème ── */
.theme-pill{
  position:fixed;top:1.2rem;right:1.2rem;z-index:300;
  display:flex;align-items:center;gap:2px;
  background:var(--pill-bg);border:1px solid var(--pill-bdr);
  border-radius:30px;padding:3px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  transition:all .4s;
}
.t-opt{
  padding:5px 14px;border-radius:22px;
  font-size:11.5px;font-weight:600;cursor:pointer;
  color:var(--pill-c);transition:all .25s;user-select:none;
}
.t-opt.on{background:var(--pill-act);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.25);}

/* ── Responsive ── */
@media(max-width:520px){
  .scene{width:100vw;height:100vw;}
  .bus-arm{width:38vw;}
  .login-card{width:min(310px,88vw);}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- Toggle thème -->
<div class="theme-pill">
  <div class="t-opt on" id="os" onclick="setT('sombre')">🌙 Sombre</div>
  <div class="t-opt"    id="oc" onclick="setT('clair')">☀️ Clair</div>
</div>

<!-- ═══════════════════ SCÈNE ORBITALE ═══════════════════ -->
<div class="scene">

  <div class="orbit-track"></div>
  <div class="orbit-track2"></div>

  <canvas id="trail-canvas" style="position:absolute;inset:0;z-index:2;pointer-events:none;"></canvas>

  <!-- BUS ORBITAL -->
  <div class="bus-container" style="--orb-dur:9s">
    <div class="bus-arm">
      <div class="bus-svg-wrap">
        <div class="bus-persp" style="position:relative;display:inline-block;">

          <!-- Fumée -->
          <div style="position:absolute;bottom:6px;right:-14px;display:flex;flex-direction:column-reverse;gap:3px;pointer-events:none;">
            <div class="pf" style="--pd:1.5s;--pdl:0s;  width:9px;height:9px;border-radius:50%;background:rgba(168,85,247,0.50);"></div>
            <div class="pf" style="--pd:1.5s;--pdl:.5s;  width:9px;height:9px;border-radius:50%;background:rgba(168,85,247,0.38);"></div>
            <div class="pf" style="--pd:1.5s;--pdl:1s;  width:9px;height:9px;border-radius:50%;background:rgba(168,85,247,0.24);"></div>
          </div>

          <!-- ════ BUS SVG HAUTE FIDÉLITÉ ════ -->
          <svg width="210" height="94" viewBox="0 0 210 94" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <!-- Corps -->
              <linearGradient id="bdy" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#1c1278"/>
                <stop offset="55%"  stop-color="#110c58"/>
                <stop offset="100%" stop-color="#080530"/>
              </linearGradient>
              <!-- Toit -->
              <linearGradient id="rof" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#2e1e9a"/>
                <stop offset="100%" stop-color="#1c1278"/>
              </linearGradient>
              <!-- Fenêtres -->
              <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#2563eb" stop-opacity=".92"/>
                <stop offset="100%" stop-color="#0c1d6e" stop-opacity=".78"/>
              </linearGradient>
              <!-- Reflet carrosserie -->
              <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"  stop-color="rgba(255,255,255,0.07)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
              </linearGradient>
              <!-- Roue -->
              <radialGradient id="whl" cx="50%" cy="35%" r="60%">
                <stop offset="0%"   stop-color="#3d3d5c"/>
                <stop offset="100%" stop-color="#0d0d1a"/>
              </radialGradient>
              <!-- Phare glow -->
              <filter id="glow-y" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="2.5" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="glow-r" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="2.5" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="glow-b" x="-100%" y="-100%" width="300%" height="300%">
                <feGaussianBlur stdDeviation="4" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <!-- Ombre portée -->
            <ellipse cx="105" cy="91" rx="94" ry="5.5" fill="rgba(0,0,0,0.45)"/>

            <!-- ── Soubassement / fond ── -->
            <rect x="16" y="62" width="178" height="14" rx="4" fill="#06041a"/>

            <!-- ── Corps principal ── -->
            <rect x="16" y="28" width="178" height="46" rx="9" fill="url(#bdy)" stroke="#3730a3" stroke-width="1.3"/>

            <!-- Reflet carrosserie haut -->
            <rect x="16" y="28" width="178" height="20" rx="9" fill="url(#shine)"/>

            <!-- ── Toit ── -->
            <rect x="22" y="14" width="166" height="20" rx="8" fill="url(#rof)" stroke="#4c3fc0" stroke-width="1"/>
            <!-- Reflet toit -->
            <rect x="22" y="14" width="166" height="8" rx="8" fill="rgba(255,255,255,0.06)"/>

            <!-- ── Bande déco rose néon ── -->
            <rect x="16" y="52" width="178" height="5.5" fill="#c0346c" opacity=".88"/>
            <!-- Bande ciel -->
            <rect x="16" y="57" width="178" height="3" fill="#0ea5e9" opacity=".60"/>
            <!-- Trait violet toit -->
            <rect x="22" y="14" width="166" height="2.5" rx="1.5" fill="#9333ea" opacity=".55"/>

            <!-- ── Bandeau LED destination ── -->
            <rect x="50" y="16" width="110" height="13" rx="3.5" fill="#03011a" stroke="#3730a3" stroke-width=".8"/>
            <rect x="52" y="18" width="106" height="9" rx="2" fill="#070420" opacity=".6"/>
            <text x="105" y="26.5" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" fill="#38bdf8" letter-spacing="2" filter="url(#glow-b)">DAKAR ▶ THIÈS</text>

            <!-- ── Fenêtres (4) ── -->
            <!-- W1 -->
            <rect x="28" y="31" width="32" height="18" rx="4" fill="url(#win)" stroke="#60a5fa" stroke-width=".7"/>
            <rect x="30" y="33" width="10" height="3" rx="1.5" fill="white" opacity=".20"/>
            <rect x="30" y="37" width="26" height="1" fill="white" opacity=".06"/>
            <!-- W2 -->
            <rect x="67" y="31" width="32" height="18" rx="4" fill="url(#win)" stroke="#60a5fa" stroke-width=".7"/>
            <rect x="69" y="33" width="10" height="3" rx="1.5" fill="white" opacity=".20"/>
            <!-- W3 -->
            <rect x="106" y="31" width="32" height="18" rx="4" fill="url(#win)" stroke="#60a5fa" stroke-width=".7"/>
            <rect x="108" y="33" width="10" height="3" rx="1.5" fill="white" opacity=".20"/>
            <!-- W4 (plus petite — porte) -->
            <rect x="145" y="31" width="24" height="18" rx="4" fill="url(#win)" stroke="#60a5fa" stroke-width=".7"/>
            <rect x="147" y="33" width="8" height="3" rx="1.5" fill="white" opacity=".18"/>

            <!-- ── Porte ── -->

            <g transform="translate(160,78)">

              <g class="wh">
                <circle r="14.5" fill="url(#whl)" stroke="#252545" stroke-width="1.2"/>
                <circle r="11.5" fill="none" stroke="#1a1a30" stroke-width="5"/>
                <line x1="-11" y1="0"   x2="11" y2="0"   stroke="#5c5c8a" stroke-width="1.5"/>
                <line x1="0"   y1="-11" x2="0"  y2="11"  stroke="#5c5c8a" stroke-width="1.5"/>
                <line x1="-7.8" y1="-7.8" x2="7.8" y2="7.8" stroke="#4a4a72" stroke-width="1.1"/>

            <!-- ── Détails fins ── -->
            <!-- Essuie-glaces -->
            <line x1="30" y1="28" x2="50" y2="22" stroke="#6366f1" stroke-width=".8" opacity=".40"/>
            <line x1="52" y1="28" x2="68" y2="22" stroke="#6366f1" stroke-width=".8" opacity=".30"/>

        </div>

    </div>
  </div>

  <!-- ═══════════════════ CARTE CONNEXION ═══════════════════ -->
  <div class="login-card">

    <div class="card-logo">
      <div class="logo-gem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="2"/>
          <path d="M16 8h4l3 3v5h-7V8z"/>
          <circle cx="5.5" cy="18.5" r="2.5"/>
          <circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">TranspoBot</div>
        <div class="logo-sub">ESP · UCAD · DIC1 Info</div>
      </div>
    </div>

    <div class="card-title">Bienvenue 👋</div>
    <div class="card-sub">Connectez-vous à votre espace de gestion</div>

    <!-- Erreur -->
    <div class="err-box" id="err-box">

    <!-- Email -->

        <svg class="fi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>

    <!-- Mot de passe -->
    <div class="field">
      <label for="password">Mot de passe</label>
      <div class="field-wrap">
        <input type="password" id="password" autocomplete="current-password"
               placeholder="••••••••"
               onkeypress="if(event.key==='Enter')login()"
               oninput="updateStrength(this.value)"/>
        <svg class="fi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <svg class="eye" id="eye-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="togglePwd()">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
      <div class="pwd-strength" id="pwd-str">
        <div class="pwd-bar" id="pb1"></div>

        <div class="pwd-bar" id="pb4"></div>

        Accès rapide
      </div>
      <div class="demo-row"><span>Email</span><span>admin@transpobot.sn</span></div>
      <div class="demo-row"><span>Mot de passe</span><span>transpo2026</span></div>
      <div class="demo-hint">↑ Cliquer pour remplir automatiquement</div>

</div>

<script>
/* ══ CONFIG ══ */
const API = '';          /* ← 'http://localhost:8000' en production */
const ORB_MS = 9000;     /* durée d'un tour en ms */

/* ══ THÈME ══ */
function setT(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('os').classList.toggle('on', t === 'sombre');
  document.getElementById('oc').classList.toggle('on', t === 'clair');
  drawBg();
}

/* ══ MOT DE PASSE ══ */
function togglePwd() {
  const i = document.getElementById('password');
  const ico = document.getElementById('eye-ico');
  i.type = i.type === 'password' ? 'text' : 'password';
  ico.style.color = i.type === 'text' ? 'var(--rose)' : '';
}
function focusPwd() { document.getElementById('password').focus(); }

/* ══ INDICATEUR FORCE MDP ══ */
function updateStrength(v) {
  const bars = [1,2,3,4].map(n => document.getElementById('pb'+n));
  bars.forEach(b => { b.className = 'pwd-bar'; });
  if (!v) return;
  const score = [/.{8,}/, /[A-Z]/, /[0-9]/, /[^A-Za-z0-9]/].filter(r => r.test(v)).length;
  const cls = score <= 1 ? 's1' : score === 2 ? 's1' : score === 3 ? 's2' : 's3';
  bars.slice(0, score).forEach(b => b.classList.add(cls));
}

/* ══ REMPLIR DÉMO ══ */
function fillDemo() {
  document.getElementById('email').value    = 'admin@transpobot.sn';
  document.getElementById('password').value = 'transpo2026';
  updateStrength('transpo2026');
}

/* ══ CANVAS FOND ══ */
const bgC = document.getElementById('bg-canvas');
const bgX = bgC.getContext('2d');

/* Étoiles */
let stars = [];
function buildStars() {
  stars = [];
  const theme = document.documentElement.getAttribute('data-theme');
  if (theme !== 'sombre') return;
  for (let i = 0; i < 90; i++) {
    stars.push({
      x: Math.random() * bgC.width,
      y: Math.random() * bgC.height,
      r: Math.random() * 1.3 + .3,
      a: Math.random() * .7 + .1,
      da: (Math.random() * .008 + .002) * (Math.random() < .5 ? 1 : -1),
      sp: Math.random() * .4 + .1,
    });
  }
}

function animStars(dt) {
  stars.forEach(s => {
    s.a += s.da;
    if (s.a > .9 || s.a < .05) s.da *= -1;
    bgX.beginPath();
    bgX.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgX.fillStyle = `rgba(255,255,255,${s.a})`;
    bgX.fill();
  });
}

function resizeBg() {
  bgC.width  = window.innerWidth;
  bgC.height = window.innerHeight;
  buildStars();
  drawBg();
}

function drawBg() {
  const th = document.documentElement.getAttribute('data-theme');
  bgX.clearRect(0, 0, bgC.width, bgC.height);
  if (th === 'sombre') {
    [[.18,.22,.12, 168,85,247],
     [.85,.8, .1,  255,77,158],
     [.65,.08,.09, 56,189,248]].forEach(([px,py,str,r,g,b]) => {
      const grd = bgX.createRadialGradient(
        bgC.width*px, bgC.height*py, 0,
        bgC.width*px, bgC.height*py, bgC.width*.65
      );
      grd.addColorStop(0, `rgba(${r},${g},${b},${str})`);
      grd.addColorStop(1, 'rgba(3,6,20,0)');
      bgX.fillStyle = grd;
      bgX.fillRect(0, 0, bgC.width, bgC.height);
    });
  } else {
    const grd = bgX.createRadialGradient(
      bgC.width*.3, bgC.height*.3, 0,
      bgC.width*.3, bgC.height*.3, bgC.width*.7
    );
    grd.addColorStop(0, 'rgba(124,58,237,0.07)');
    grd.addColorStop(1, 'rgba(240,238,255,0)');
    bgX.fillStyle = grd;
    bgX.fillRect(0, 0, bgC.width, bgC.height);
  }
}

/* ══ CANVAS TRAÎNÉE ORBITALE ══ */
const trC = document.getElementById('trail-canvas');
const trX = trC.getContext('2d');
const scene = document.querySelector('.scene');
let trailAngle = 0;

function initTrail() {
  const sz = scene.offsetWidth;
  trC.width = sz; trC.height = sz;
}

function drawTrail() {
  const sz = trC.width;
  const cx = sz / 2, cy = sz / 2;
  const rx = sz * 0.475;
  const ry = rx * 0.38;

  trX.clearRect(0, 0, sz, sz);

  /* ── Traînée principale (120° derrière) ── */
  const steps = 80;
  const trLen = Math.PI * 2 * 0.34;
  for (let i = 0; i < steps; i++) {
    const a0 = (trailAngle - trLen) + (trLen / steps) * i;
    const a1 = (trailAngle - trLen) + (trLen / steps) * (i + 1);
    const x0 = cx + rx * Math.cos(a0), y0 = cy + ry * Math.sin(a0);
    const x1 = cx + rx * Math.cos(a1), y1 = cy + ry * Math.sin(a1);
    const p = i / steps;
    const alpha = p * 0.60;
    /* Couleur : violet → rose → ciel */
    let r, g, b;
    if (p < .5) {
      const t = p * 2;
      r = Math.round(168 + (255-168)*t);
      g = Math.round(85  + (77 -85 )*t);
      b = Math.round(247 + (158-247)*t);
    } else {
      const t = (p-.5)*2;
      r = Math.round(255 + (56 -255)*t);
      g = Math.round(77  + (189-77 )*t);
      b = Math.round(158 + (248-158)*t);
    }
    trX.beginPath(); trX.moveTo(x0,y0); trX.lineTo(x1,y1);
    trX.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    trX.lineWidth   = 4.5 * p + .5;
    trX.lineCap     = 'round'; trX.stroke();
  }

  /* ── Halo lumineux à la tête du bus ── */
  const hx = cx + rx * Math.cos(trailAngle);
  const hy = cy + ry * Math.sin(trailAngle);
  const rg = trX.createRadialGradient(hx,hy,0,hx,hy,22);
  rg.addColorStop(0, 'rgba(56,189,248,0.70)');
  rg.addColorStop(.5,'rgba(168,85,247,0.25)');
  rg.addColorStop(1, 'rgba(56,189,248,0)');
  trX.beginPath(); trX.arc(hx,hy,22,0,Math.PI*2);
  trX.fillStyle = rg; trX.fill();

  /* ── Étincelles ── */
  for (let i = 0; i < 3; i++) {
    const sa = trailAngle - Math.random() * .3;
    const sx = cx + rx * Math.cos(sa) + (Math.random()-0.5)*6;
    const sy = cy + ry * Math.sin(sa) + (Math.random()-0.5)*6;
    trX.beginPath(); trX.arc(sx,sy,Math.random()*1.8+.5,0,Math.PI*2);
    trX.fillStyle = `rgba(255,255,255,${Math.random()*.6+.2})`;
    trX.fill();
  }
}

/* ══ BOUCLE ANIMATION ══ */
let lastTs = null;
function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = ts - lastTs; lastTs = ts;

  /* Fond */
  drawBg();
  animStars(dt);

  /* Traînée orbitale */
  trailAngle += (Math.PI * 2) * (dt / ORB_MS);
  drawTrail();

  requestAnimationFrame(loop);
}

/* ══ CONNEXION ══ */
async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errBox   = document.getElementById('err-box');
  const errTxt   = document.getElementById('err-text');
  const btn      = document.getElementById('btn');
  const spin     = document.getElementById('spin');
  const btnTxt   = document.getElementById('btn-txt');
  const btnIco   = document.getElementById('btn-ico');

  errBox.classList.remove('show');

  if (!email || !password) {
    errTxt.textContent = 'Veuillez remplir tous les champs.';
    errBox.classList.add('show'); return;
  }
  if (!email.includes('@')) {
    errTxt.textContent = 'Adresse email invalide.';
    errBox.classList.add('show'); return;
  }

  /* État chargement */
  btn.disabled = true;
  btnTxt.textContent = 'Connexion en cours…';
  spin.style.display = 'block';
  btnIco.style.display = 'none';

  try {
    const r = await fetch(`${API}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();

    if (r.ok && d.success) {
      sessionStorage.setItem('tb_user', JSON.stringify(d.user));
      spin.style.display = 'none';
      btnTxt.textContent = '✓ Connecté !';
      btn.classList.add('success');
      setTimeout(() => { window.location.href = 'transpobot.html'; }, 650);
    } else {
      throw new Error(d.detail || 'Identifiants incorrects.');
    }
  } catch(e) {
    errTxt.textContent = e.message || 'Erreur de connexion au serveur.';
    errBox.classList.add('show');
    btn.disabled = false;
    btnTxt.textContent = 'Se connecter';
    spin.style.display = 'none';
    btnIco.style.display = 'block';
    btn.classList.remove('success');
  }
}

/* ══ INIT ══ */
window.addEventListener('resize', () => { resizeBg(); initTrail(); });
resizeBg();
initTrail();
requestAnimationFrame(loop);
</script>
